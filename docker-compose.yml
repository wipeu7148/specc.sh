services:
  # Redis — 分布式限流 / 缓存
  redis:
    image: redis:7-alpine
    container_name: ai-stack-redis
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - ./.data/redis:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # PostgreSQL 数据库
  db:
    image: postgres:18
    container_name: ai-stack-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ai_stack_db}
    ports:
      - "5432:5432"
    volumes:
      - ./.data/postgres:/var/lib/postgresql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO — S3-compatible object storage (dev / staging)
  # To swap to Alibaba Cloud OSS in production, remove this service and
  # update STORAGE_* variables in the server environment.
  minio:
    image: minio/minio:latest
    container_name: ai-stack-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console (http://localhost:9001)
    volumes:
      - ./.data/minio:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot container that creates the bucket and sets it to public-read
  minio-init:
    image: minio/mc:latest
    container_name: ai-stack-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/${MINIO_BUCKET:-avatars};
      mc anonymous set download local/${MINIO_BUCKET:-avatars};
      echo 'MinIO bucket ready.';
      "
    networks:
      - app-network
    restart: "no"

  # 数据库迁移（一次性容器，生产环境启动前执行 drizzle-kit push）
  db-migrate:
    image: ai-stack-server-migrate:latest
    container_name: ai-stack-db-migrate
    build:
      context: .
      dockerfile: packages/server/Dockerfile
      target: migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ai_stack_db}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: "no"

  # 后端服务
  server:
    image: ai-stack-server:latest
    container_name: ai-stack-server
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ai_stack_db}
      NODE_ENV: production
      PORT: 4000
      # Storage (MinIO — S3 compatible)
      STORAGE_PROVIDER: s3
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_REGION: us-east-1
      STORAGE_BUCKET: ${MINIO_BUCKET:-avatars}
      STORAGE_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      STORAGE_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      # Public URL must be reachable from the user's browser
      STORAGE_PUBLIC_URL: ${STORAGE_PUBLIC_URL:-http://localhost:9000}
      STORAGE_PATH_STYLE: "true"
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      db-migrate:
        condition: service_completed_successfully
    networks:
      - app-network
    restart: unless-stopped

  # 前端服务（React Router SSR）
  web:
    image: ai-stack-web:latest
    container_name: ai-stack-web
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3000
      # 后端 API 地址（Docker 内部网络，由 server.mjs 代理 /trpc 和 /upload）
      - API_URL=http://server:4000
    ports:
      - "8080:3000"
    depends_on:
      - server
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
